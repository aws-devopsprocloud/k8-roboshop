apiVersion: v1 
kind: ConfigMap 
metadata: 
  name: nginx-config 
  namespace: roboshop
data: 
  nginx.conf: | 
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {
      worker_connections 1024;
    }

    http {
      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

      access_log  /var/log/nginx/access.log  main;

      sendfile            on;
      tcp_nopush          on;
      keepalive_timeout   65;
      types_hash_max_size 4096;

      include             /etc/nginx/mime.types;
      default_type        application/octet-stream;

      include /etc/nginx/conf.d/*.conf;

      server {
          listen       80;
          listen       [::]:80;
          server_name  _;
          root         /usr/share/nginx/html;

          include /etc/nginx/default.d/*.conf;

          error_page 404 /404.html;
          location = /404.html {
          }

          error_page 500 502 503 504 /50x.html;
          location = /50x.html {
          }

          location /images/ {
            expires 5s;
            root   /usr/share/nginx/html;
            try_files $uri /images/placeholder.jpg;
          }
          location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
          # location /api/user/ { proxy_pass http://user:8080/; }
          # location /api/cart/ { proxy_pass http://cart:8080/; }
          # location /api/shipping/ { proxy_pass http://shipping:8080/; }
          # location /api/payment/ { proxy_pass http://payment:8080/; }

          location /health {
            stub_status on;
            access_log off;
          }

      }
    }

---
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: frontend 
  namespace: roboshop 
spec: 
  replicas: 1 
  selector:
    matchLabels:  
      app: frontend 
      project: roboshop 
      tier: frontend 
  template:
    metadata:
      name: frontend 
      labels:
        app: frontend 
        project: roboshop 
        tier: frontend
    spec: 
      containers: 
      - name: frontend 
        image: devopsprocloudaws/frontend:1.0.0
        imagePullPolicy: Always
        ports: 
        - containerPort: 80
        volumeMounts:
            - name: nginx-conf # volume name 
              mountPath: /etc/nginx/nginx.conf # where do you want to attach in the pod 
              subPath: nginx.conf
              readOnly: true
      volumes:
      - name: nginx-conf
        configMap: # We are creating the volume from the configmap 
          name: nginx-config
          items:
            - key: nginx.conf
              path: nginx.conf

--- 
apiVersion: v1 
kind: Service
metadata:
  name: frontend
  namespace: roboshop 
spec: 
  type: LoadBalancer
  selector: # selecting the Pod by using the same Pod labels 
    app: frontend 
    project: roboshop 
    tier: frontend
  ports:
  - protocol: TCP
    port: 80 # service port 
    targetPort: 80 # container port