apiVersion: v1 
kind: ConfigMap 
metadata:
  name: cart 
  namespace: roboshop 
data: 
  REDIS_HOST: "redis" 
  CATALOGUE_HOST: "catalogue" 
  CATALOGUE_PORT: "8080"
  
--- 
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: cart 
  namespace: roboshop 
spec: 
  replicas: 1 
  selector:
    matchLabels:  
      app: cart 
      project: roboshop 
      tier: app 
  template:
    metadata:
      name: cart 
      labels:
        app: cart 
        project: roboshop 
        tier: app
    spec: 
      containers: 
      - name: cart 
        image: devopsprocloudaws/cart:1.0.0
        ports: 
        - containerPort: 8080 
        envFrom: 
        - configMapRef: # We need to put - because the devops-config has multiple key-value pairs
            name: cart 

--- 
apiVersion: v1 
kind: Service
metadata:
  name: cart
  namespace: roboshop 
spec: 
  selector: # selecting the Pod by using the same Pod labels 
    app: cart 
    project: roboshop 
    tier: app
  ports:
  - protocol: TCP
    port: 8080 # service port 
    targetPort: 8080 # container port

