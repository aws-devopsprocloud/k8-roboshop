apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: redis 
  namespace: roboshop 
spec: 
  replicas: 1 
  selector:
    matchLabels:  
      app: redis 
      project: roboshop 
      tier: db 
  template:
    metadata: 
      name: redis 
      labels:
        app: redis 
        project: roboshop 
        tier: db
    spec:   
      containers: 
      - name: redis 
        image: redis
        imagePullPolicy: Always
        ports:
        - containerPort: 6379 
--- 

apiVersion: v1 
kind: Service 
metadata: 
  name: redis 
  namespace: roboshop
spec: 
  selector: # selecting the Pod by using the same Pod labels 
    app: redis 
    project: roboshop 
    tier: db
  ports:
  - protocol: TCP
    port: 6379 # service port 
    targetPort: 6379 # container port