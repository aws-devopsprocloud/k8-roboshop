apiVersion: v1 
kind: ConfigMap 
metadata:
  name: catalogue 
  namespace: roboshop 
data: 
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
  
--- 
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: catalogue 
  namespace: roboshop 
spec: 
  replicas: 1 
  selector:
    matchLabels:  
      app: catalogue 
      project: roboshop 
      tier: app 
  template:
    metadata:
      name: catalogue 
      labels:
        app: catalogue 
        project: roboshop 
        tier: app
    spec: 
      containers: 
      - name: catalogue 
        image: devopsprocloudaws/catalogue:1.0.0
        ports: 
        - containerPort: 8080 
        envFrom: 
        - configMapRef: # We need to put - because the devops-config has multiple key-value pairs
            name: catalogue 

--- 
apiVersion: v1 
kind: Service
metadata:
  name: catalogue
  namespace: roboshop 
spec: 
  selector: # selecting the Pod by using the same Pod labels 
    app: catalogue 
    project: roboshop 
    tier: app
  ports:
  - protocol: TCP
    port: 8080 # service port 
    targetPort: 8080 # container port

