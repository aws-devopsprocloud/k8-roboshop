apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: mongodb 
  namespace: roboshop 
spec: 
  replicas: 1 
  selector:
    matchLabels:  
      app: mongodb 
      project: roboshop 
      tier: db 
  template:
    metadata: 
      name: mongodb 
      labels:
        app: mongodb 
        project: roboshop 
        tier: db
    spec:   
      containers: 
      - name: mongodb 
        image: devopsprocloudaws/mongodb:1.0.0 
        ports:
        - containerPort: 27017 
--- 

apiVersion: v1 
kind: Service 
metadata: 
  name: mongodb 
  namespace: roboshop
spec: 
  selector: # selecting the Pod by using the same Pod labels 
    app: mongodb 
    project: roboshop 
    tier: db
  ports:
  - protocol: TCP
    port: 27017 # service port 
    targetPort: 27017 # container port



